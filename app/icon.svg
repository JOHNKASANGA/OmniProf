<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="haloGradient" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer halo -->
  <circle cx="100" cy="100" r="95" fill="url(#haloGradient)"/>

  <!-- Main orb -->
  <circle cx="100" cy="100" r="50" fill="url(#orbGradient)" filter="url(#softGlow)"/>

  <!-- Inner "O" with gap at top -->
  <path d="M 96 72 A 28 28 0 1 0 104 72"
        fill="none"
        stroke="white"
        stroke-opacity="0.92"
        stroke-width="3.5"
        stroke-linecap="round"/>
</svg>